suite: test kruize_db_deployment.yaml
templates:
  - kruize_db_deployment.yaml

tests:
  - it: should create a Deployment with the correct default settings
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kruize-db
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.selector.matchLabels.app
          value: RELEASE-NAME-kruize-db
      - equal:
          path: spec.template.metadata.labels.app
          value: RELEASE-NAME-kruize-db
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-kruize

  - it: should validate kruize-db container settings
    asserts:
      - exists:
          path: spec.template.spec.containers[?(@.name=='kruize-db')]
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].image
          value: "quay.io/kruizehub/postgres:15.2"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].imagePullPolicy
          value: "IfNotPresent"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].env[?(@.name=='POSTGRES_PASSWORD')]
          value:
            name: POSTGRES_PASSWORD
            value: "admin"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].env[?(@.name=='POSTGRES_USER')]
          value:
            name: POSTGRES_USER
            value: "admin"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].env[?(@.name=='POSTGRES_DB')]
          value:
            name: POSTGRES_DB
            value: "kruizeDB"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].env[?(@.name=='PGDATA')]
          value:
            name: PGDATA
            value: "/var/lib/pg_data"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].ports[0].containerPort
          value: 5432
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].volumeMounts[0].mountPath
          value: "/var/lib/pgsql/data"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].volumeMounts[0].name
          value: "kruize-db-storage"

  - it: should validate resource settings
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.requests.memory
          value: "100Mi"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.requests.cpu
          value: "0.5"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.limits.memory
          value: "100Mi"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.limits.cpu
          value: "0.5"

  - it: should validate volume configuration
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: "kruize-db-storage"
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: "RELEASE-NAME-kruize-db-pv-claim"

  - it: should create a Deployment with the correct settings overrides
    set:
      db.image.tag: "16.0"
      db.resources.requests.memory: "256Mi"
      db.resources.requests.cpu: "1"
      db.resources.limits.memory: "512Mi"
      db.resources.limits.cpu: "2"
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].image
          value: "quay.io/kruizehub/postgres:16.0"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.requests.memory
          value: "256Mi"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.requests.cpu
          value: "1"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.limits.memory
          value: "512Mi"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize-db')].resources.limits.cpu
          value: "2"


