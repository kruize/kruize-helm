suite: test service_monitor.yaml (minikube)
templates:
  - service_monitor.yaml
values:
  - ../../values-minikube.yaml

tests:
  - it: should create a ServiceMonitor with the correct default settings
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kruize-service-monitor
      - equal:
          path: metadata.labels
          value:
            app: RELEASE-NAME-kruize
            helm.sh/chart: kruize-0.1.0
            app.kubernetes.io/name: kruize
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/version: "0.9"
            app.kubernetes.io/managed-by: Helm
      - equal:
          path: spec.selector.matchLabels
          value:
            app: RELEASE-NAME-kruize
            app.kubernetes.io/name: kruize
            app.kubernetes.io/instance: RELEASE-NAME
      - equal:
          path: spec.endpoints[0].port
          value: kruize-port
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should create a ServiceMonitor with the correct settings overrides
    set:
      monitoring.interval: 60s
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 60s

  - it: should not create ServiceMonitor when monitoring is disabled
    set:
      monitoring.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a ServiceMonitor in the release namespace
    release:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: custom-namespace

