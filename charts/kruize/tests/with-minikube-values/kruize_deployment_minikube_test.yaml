suite: test kruize_deployment.yaml (minikube)
templates:
  - kruize_deployment.yaml
values:
  - ../../values-minikube.yaml

tests:
  - it: should create a Deployment with correct default settings
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kruize
      - equal:
          path: metadata.namespace
          value: NAMESPACE
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-kruize
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kruize
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "0.9"
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: kruize-0.1.0
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: kruize
            app.kubernetes.io/instance: RELEASE-NAME
      - equal:
          path: spec.template.metadata.labels
          value:
            app: RELEASE-NAME-kruize
            app.kubernetes.io/name: kruize
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should use default service account when serviceAccount.create is false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: should validate init container for database wait
    asserts:
      - exists:
          path: spec.template.spec.initContainers[?(@.name=='wait-for-kruize-db')]
      - equal:
          path: spec.template.spec.initContainers[?(@.name=='wait-for-kruize-db')].image
          value: "quay.io/kruizehub/postgres:15.2"
      - contains:
          path: spec.template.spec.initContainers[?(@.name=='wait-for-kruize-db')].command
          content: "sh"
      - contains:
          path: spec.template.spec.initContainers[?(@.name=='wait-for-kruize-db')].command
          content: "-c"

  - it: should validate kruize container settings
    asserts:
      - exists:
          path: spec.template.spec.containers[?(@.name=='kruize')]
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].image
          value: "quay.io/kruize/autotune_operator:0.9"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].imagePullPolicy
          value: "Always"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].ports[0].name
          value: "kruize-port"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].ports[0].containerPort
          value: 8080

  - it: should validate environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=='kruize')].env
          content:
            name: LOGGING_LEVEL
            value: "info"
      - contains:
          path: spec.template.spec.containers[?(@.name=='kruize')].env
          content:
            name: ROOT_LOGGING_LEVEL
            value: "error"
      - contains:
          path: spec.template.spec.containers[?(@.name=='kruize')].env
          content:
            name: DB_CONFIG_FILE
            value: "/etc/config/dbconfigjson"
      - contains:
          path: spec.template.spec.containers[?(@.name=='kruize')].env
          content:
            name: KRUIZE_CONFIG_FILE
            value: "/etc/config/kruizeconfigjson"
      - contains:
          path: spec.template.spec.containers[?(@.name=='kruize')].env
          content:
            name: KAFKA_RESPONSE_FILTER_INCLUDE
            value: "summary"

  - it: should not set resource requests and limits when empty
    asserts:
      - notExists:
          path: spec.template.spec.containers[?(@.name=='kruize')].resources

  - it: should validate volume mounts and config volume
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].volumeMounts[0].name
          value: "config-volume"
      - equal:
          path: spec.template.spec.containers[?(@.name=='kruize')].volumeMounts[0].mountPath
          value: "/etc/config"
      - equal:
          path: spec.template.spec.volumes[0].name
          value: "config-volume"
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: "RELEASE-NAME-kruize-config"


