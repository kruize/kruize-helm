suite: test storage templates (minikube)
templates:
  - storage_pv.yaml
  - storage_pvc.yaml
values:
  - ../../values-minikube.yaml

tests:
  - it: should create a PersistentVolume with minikube-specific settings
    template: storage_pv.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: PersistentVolume
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kruize-db-pv-volume
      - equal:
          path: metadata.labels.type
          value: local
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-kruize-db
      - equal:
          path: spec.storageClassName
          value: manual
      - equal:
          path: spec.capacity.storage
          value: 1Gi
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.persistentVolumeReclaimPolicy
          value: Retain
      - equal:
          path: spec.hostPath.path
          value: "/data/postgres/RELEASE-NAME-kruize"

  - it: should create a PersistentVolume with the correct settings overrides
    template: storage_pv.yaml
    set:
      db.pvc.storageSize: "2Gi"
      db.pvc.storageClass: "standard"
      db.pvc.hostPath: "/custom/data"
    asserts:
      - equal:
          path: spec.capacity.storage
          value: 2Gi
      - equal:
          path: spec.storageClassName
          value: standard
      - equal:
          path: spec.hostPath.path
          value: "/custom/data/RELEASE-NAME-kruize"

  - it: should create a PersistentVolumeClaim with minikube-specific settings
    template: storage_pvc.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: PersistentVolumeClaim
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kruize-db-pv-claim
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-kruize-db
      - equal:
          path: spec.storageClassName
          value: manual
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should create a PersistentVolumeClaim with the correct settings overrides
    template: storage_pvc.yaml
    set:
      db.pvc.storageSize: "2Gi"
      db.pvc.storageClass: "standard"
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi
      - equal:
          path: spec.storageClassName
          value: standard

  - it: should create a PersistentVolumeClaim in the release namespace
    template: storage_pvc.yaml
    release:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace


