{{- $fullName := include "kruize.fullname" . -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kruize.deploymentName" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ $fullName }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $fullName }}-db
  template:
    metadata:
      labels:
        app: {{ $fullName }}-db
    spec:
      serviceAccountName: {{ include "kruize.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}-db
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.password | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.db.user | quote }}
            - name: POSTGRES_DB
              value: {{ printf "%s-%s" .Values.db.name $fullName | quote }}
            - name: PGDATA
              value: /var/lib/pg_data
          resources:
            requests:
              memory: {{ .Values.db.resources.requests.memory | quote }}
              cpu: {{ .Values.db.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.db.resources.limits.memory | quote }}
              cpu: {{ .Values.db.resources.limits.cpu | quote }}
          ports:
            - containerPort: {{ .Values.db.service.port }}
          volumeMounts:
            - name: kruize-db-storage
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: kruize-db-storage
          persistentVolumeClaim:
            claimName: {{ $fullName }}-db-pv-claim
