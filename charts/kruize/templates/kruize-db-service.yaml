{{- $fullName := include "kruize.fullname" . -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-db-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: kruize-db
spec:
  type: {{ .Values.db.service.type }}
  ports:
    - name: kruize-db-port
      port: {{ .Values.db.service.port }}
      targetPort: {{ .Values.db.service.port }}
  selector:
    app: kruize-db
