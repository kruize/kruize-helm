{{- $fullName := include "kruize.fullname" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ $fullName }}-test"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kruize.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

